{% extends 'base.html' %}
{% block title %}Book{% endblock %}
{% block content %}

<div class="max-w-lg mx-auto animate-fade-up">
    <div class="khub-card p-8 text-center">
        <h1 class="text-2xl font-bold mb-2" style="font-family: 'Orbitron', sans-serif;">CONFIRM<br><span style="color: #0066FF;">BOOKING</span></h1>
        <p class="text-sm text-[#4A5568] mb-8">Choose your duration</p>
        
        <div class="space-y-4 mb-8 text-left">
            <div class="flex justify-between py-3 border-b-2 border-[#0B1D3A]">
                <span class="text-[#4A5568]">Field</span>
                <span class="font-bold">{{ field.name }}</span>
            </div>
            <div class="flex justify-between py-3 border-b-2 border-[#0B1D3A]">
                <span class="text-[#4A5568]">Date</span>
                <span class="font-extrabold">{{ date }}</span>
            </div>
            <div class="flex justify-between py-3 border-b-2 border-[#0B1D3A]">
                <span class="text-[#4A5568]">Start Time</span>
                <span class="font-extrabold text-[#0066FF]">{{ hour }}:00</span>
            </div>
        </div>
        
        <p class="text-sm text-[#4A5568] mb-4">How many hours?</p>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-3 gap-3 mb-6">
                <label class="cursor-pointer">
                    <input type="radio" name="duration" value="1" class="peer hidden" checked>
                    <div class="peer-checked:bg-[#0066FF] peer-checked:text-white peer-checked:border-[#0066FF] border-2 border-[#0B1D3A] rounded-xl p-4 text-center font-bold transition shadow-[3px_3px_0px_#0B1D3A] peer-checked:shadow-[3px_3px_0px_#0044CC]">
                        1h<br><span class="text-sm opacity-70">${{ price }}</span>
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="duration" value="2" class="peer hidden">
                    <div class="peer-checked:bg-[#0066FF] peer-checked:text-white peer-checked:border-[#0066FF] border-2 border-[#0B1D3A] rounded-xl p-4 text-center font-bold transition shadow-[3px_3px_0px_#0B1D3A] peer-checked:shadow-[3px_3px_0px_#0044CC]">
                        2h<br><span class="text-sm opacity-70">${{ price|floatformat:"0" }}{% widthratio price 1 2 as p2 %}{{ p2 }}</span>
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="duration" value="3" class="peer hidden">
                    <div class="peer-checked:bg-[#0066FF] peer-checked:text-white peer-checked:border-[#0066FF] border-2 border-[#0B1D3A] rounded-xl p-4 text-center font-bold transition shadow-[3px_3px_0px_#0B1D3A] peer-checked:shadow-[3px_3px_0px_#0044CC]">
                        3h<br><span class="text-sm opacity-70">${{ price|floatformat:"0" }}{% widthratio price 1 3 as p3 %}{{ p3 }}</span>
                    </div>
                </label>
            </div>
            
            <button type="submit" class="btn-chrome w-full py-4 text-sm">⚡ Confirm Booking</button>
        </form>
        
        <a href="{% url 'booking:field_detail' field.id %}" class="text-sm text-[#4A5568] hover:text-[#0B1D3A] mt-4 block">Cancel</a>
    </div>
</div>

{% endblock %}
