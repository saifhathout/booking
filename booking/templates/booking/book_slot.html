{% extends 'base.html' %}
{% block title %}Confirm Booking{% endblock %}
{% block content %}

<div class="max-w-lg mx-auto animate-fade-up">
    <div class="premium-card p-8 text-center">
        <div class="w-20 h-20 rounded-full bg-[#00D4AA]/10 flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check-circle text-4xl text-[#00D4AA]"></i>
        </div>
        
        <h1 class="text-2xl font-extrabold mb-2">Confirm Booking</h1>
        <p class="text-gray-500 mb-8">One tap to secure your slot</p>
        
        <div class="space-y-4 mb-8 text-left">
            <div class="flex justify-between py-3 border-b border-[#2A2A2A]">
                <span class="text-gray-500">Field</span>
                <span class="font-semibold">{{ field.name }}</span>
            </div>
            <div class="flex justify-between py-3 border-b border-[#2A2A2A]">
                <span class="text-gray-500">Venue</span>
                <span class="font-semibold">{{ field.venue.name }}</span>
            </div>
            <div class="flex justify-between py-3 border-b border-[#2A2A2A]">
                <span class="text-gray-500">Date</span>
                <span class="font-bold">{{ date }}</span>
            </div>
            <div class="flex justify-between py-3 border-b border-[#2A2A2A]">
                <span class="text-gray-500">Time</span>
                <span class="font-bold">{{ hour }}:00</span>
            </div>
            <div class="flex justify-between py-3">
                <span class="text-gray-500">Total</span>
                <span class="text-3xl font-extrabold text-[#00D4AA]">${{ field.price_per_hour }}</span>
            </div>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn-gradient w-full text-lg py-4 mb-4">
                Confirm Booking
            </button>
        </form>
        <a href="{% url 'booking:field_detail' field.id %}" class="text-sm text-gray-500 hover:text-white transition">Cancel</a>
    </div>
</div>

{% endblock %}
