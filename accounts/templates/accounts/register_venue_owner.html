{% extends 'base.html' %}
{% block title %}List Your Venue{% endblock %}
{% block content %}

<div class="min-h-[80vh] flex items-center justify-center py-8">
    <div class="w-full max-w-md animate-fade-up">
        
        <div class="text-center mb-10">
            <div class="card-icon-energy icon-purple w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-building text-3xl text-white"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tighter">LIST YOUR<br><span class="text-[#00FF88]">VENUE</span></h1>
            <p class="text-gray-400 mt-2">Start earning today</p>
        </div>

        <div class="energy-card p-8">
            <form method="POST" class="space-y-4">
                {% csrf_token %}
                
                <input type="email" name="email" class="input-fire" placeholder="EMAIL" required>
                <input type="text" name="full_name" class="input-fire" placeholder="FULL NAME" required>
                <input type="text" name="phone" class="input-fire" placeholder="PHONE" required>
                <input type="text" name="business_name" class="input-fire" placeholder="BUSINESS NAME" required>
                <textarea name="business_address" rows="2" class="input-fire" placeholder="BUSINESS ADDRESS" required></textarea>
                <input type="text" name="business_city" class="input-fire" placeholder="CITY" required>
                <input type="password" name="password" class="input-fire" placeholder="PASSWORD" required>
                
                <button type="submit" class="btn-fire w-full py-4 text-base mt-4">
                    CREATE ACCOUNT <i class="fas fa-rocket ml-2"></i>
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account? <a href="{% url 'accounts:login' %}" class="text-[#00FF88] font-bold hover:underline">SIGN IN</a>
        </p>
    </div>
</div>

{% endblock %}
