{% extends 'base.html' %}
{% block title %}Join{% endblock %}
{% block content %}

<div class="min-h-[80vh] flex items-center justify-center py-8">
    <div class="w-full max-w-md animate-fade-up">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-[3px]" style="font-family: 'Orbitron', sans-serif;">JOIN<br><span style="color: #0066FF;">K-HUB</span></h1>
        </div>
        <div class="khub-card p-8">
            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <input type="text" name="username" class="input-khub" placeholder="Username" required>
                <input type="email" name="email" class="input-khub" placeholder="Email" required>
                <input type="text" name="full_name" class="input-khub" placeholder="Full Name" required>
                <input type="text" name="phone" class="input-khub" placeholder="Phone" required>
                <input type="text" name="city" class="input-khub" placeholder="City" required>
                <input type="password" name="password" class="input-khub" placeholder="Password" required>
                <input type="password" name="confirm_password" class="input-khub" placeholder="Confirm Password" required>
                <button type="submit" class="btn-chrome w-full py-4 text-xs">Create Account</button>
            </form>
        </div>
        <p class="text-center text-sm text-[#4A5568] mt-6">
            Already have an account? <a href="{% url 'accounts:login' %}" class="text-[#0066FF] font-bold">Sign In</a>
        </p>
    </div>
</div>

{% endblock %}
