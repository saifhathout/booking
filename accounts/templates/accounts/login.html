{% extends 'base.html' %}
{% block title %}Sign In{% endblock %}
{% block content %}

<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md animate-fade-up">
        
        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="relative inline-block">
                <div class="logo-shield mx-auto" style="width:60px;height:66px;">
                    <span class="logo-crown">👑</span>
                    K
                </div>
            </div>
            <h1 class="text-3xl font-black mt-6 tracking-[3px]" style="font-family: 'Orbitron', sans-serif;">WELCOME<br><span style="color: #0066FF;">BACK</span></h1>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded-xl text-sm font-bold border-2 border-[#0B1D3A] shadow-[3px_3px_0px_#0B1D3A] {% if message.tags == 'error' %}bg-[#FF2D78]/10 text-[#FF2D78]{% else %}bg-[#0066FF]/10 text-[#0066FF]{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="khub-card p-8">
            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <input type="text" name="username" class="input-khub" placeholder="Username or Email" required>
                <input type="password" name="password" class="input-khub" placeholder="Password" required>
                <button type="submit" class="btn-chrome w-full py-4 text-sm">Enter</button>
            </form>
        </div>

        <div class="mt-8 text-center">
            <p class="text-xs text-[#4A5568] mb-5 uppercase tracking-[2px] font-bold" style="font-family: 'Orbitron', sans-serif;">New here?</p>
            <div class="grid grid-cols-2 gap-4">
                <a href="{% url 'accounts:register_player' %}" class="khub-card p-5 text-center group">
                    <span class="text-2xl mb-2 block">⚽</span>
                    <span class="text-xs font-bold" style="font-family: 'Orbitron', sans-serif;">I'M A PLAYER</span>
                </a>
                <a href="{% url 'accounts:register_venue_owner' %}" class="khub-card p-5 text-center group">
                    <span class="text-2xl mb-2 block">🏟️</span>
                    <span class="text-xs font-bold" style="font-family: 'Orbitron', sans-serif;">I OWN A VENUE</span>
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
