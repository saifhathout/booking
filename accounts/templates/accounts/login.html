{% extends 'base.html' %}
{% load static %}

{% block title %}Login - K-HUB{% endblock %}

{% block content %}

<div class="animate-fade-up max-w-md mx-auto px-4 py-8">

    <!-- ✅ 1. Hero - Glassmorphism -->
    <!-- <div class="mb-8">
        <div class="rounded-3xl bg-white/80 backdrop-blur-xl border border-white/40 shadow-xl p-8 text-center">
            <img src="{% static 'img/logo.png' %}" 
                 alt="K-HUB" 
                 class="w-20 h-20 mx-auto rounded-3xl shadow-xl mb-5">
            <h1 class="text-4xl font-black tracking-wide text-[#1A2A4A]">
                WELCOME
                <span class="text-[#12E6FF]">BACK</span>
            </h1>
            <p class="text-gray-500 mt-2">
                Sign in to continue your journey.
            </p>
        </div>
    </div> -->

    <!-- ✅ 2. Form Card - Glassmorphism -->
    <div class="rounded-3xl bg-white/80 backdrop-blur-xl border border-white/40 shadow-xl p-8">

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="rounded-2xl {% if message.tags == 'success' %}bg-green-50 border border-green-200 text-green-700{% else %}bg-red-50 border border-red-200 text-red-600{% endif %} px-5 py-4 mb-5">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <!-- Email / Username -->
            <div class="mb-4">
                <label class="block text-sm font-semibold text-[#1A2A4A] mb-2">
                    Email or Username
                </label>
                <input type="text" 
                       name="username" 
                       class="w-full bg-white border border-gray-200 rounded-2xl px-5 py-4 outline-none focus:ring-4 focus:ring-[#12E6FF]/20 focus:border-[#12E6FF] transition"
                       placeholder="Enter your email or username"
                       required>
            </div>

            <!-- Password -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-[#1A2A4A] mb-2">
                    Password
                </label>
                <input type="password" 
                       name="password" 
                       class="w-full bg-white border border-gray-200 rounded-2xl px-5 py-4 outline-none focus:ring-4 focus:ring-[#12E6FF]/20 focus:border-[#12E6FF] transition"
                       placeholder="Enter your password"
                       required>
            </div>

            <!-- ✅ 4. Button -->
            <button type="submit" 
                    class="w-full bg-[#1A2A4A] hover:bg-[#24395E] text-white rounded-2xl py-4 font-semibold transition shadow-lg">
                Sign In →
            </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-4 my-6">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="text-sm text-gray-400 font-medium">or</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- ✅ 6. Register Options -->
        <div class="grid grid-cols-2 gap-4">
            <a href="{% url 'accounts:register_player' %}" 
               class="rounded-3xl bg-white/80 backdrop-blur-xl border border-white/40 shadow-lg p-6 text-center hover:-translate-y-1 hover:shadow-2xl transition">
                <div class="text-3xl mb-2">👤</div>
                <p class="text-sm font-bold text-[#1A2A4A]">Player</p>
            </a>
            <a href="{% url 'accounts:register_venue_owner' %}" 
               class="rounded-3xl bg-white/80 backdrop-blur-xl border border-white/40 shadow-lg p-6 text-center hover:-translate-y-1 hover:shadow-2xl transition">
                <div class="text-3xl mb-2">🏟️</div>
                <p class="text-sm font-bold text-[#1A2A4A]">Venue Owner</p>
            </a>
        </div>

        <!-- Forgot Password -->
        <div class="text-center mt-6">
            <a href="#" class="text-sm text-gray-400 hover:text-[#1A2A4A] transition">
                Forgot password?
            </a>
        </div>
    </div>
</div>

{% endblock %}
