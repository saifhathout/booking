<!-- navbar.html - Royal Navy + Gold Style -->

{% load static %}
<nav class="hidden md:block bg-[#0f1724]/95 backdrop-blur-xl border-b border-[#D4A853]/20 sticky top-0 z-50 shadow-lg shadow-[#D4A853]/5">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="flex items-center justify-between h-16">
            <!-- Logo - Gold -->
            <a href="/" class="flex items-center gap-3 transition hover:scale-105 duration-300">
                <div class="relative">
                    <img src="{% static 'img/logo.png' %}" alt="K-HUB" class="w-10 h-10  ">
                    <div class="absolute -inset-1 rounded-lg bg-[#D4A853]/10 blur-xl -z-10"></div>
                </div>
                <span class="text-xl font-black tracking-tight text-white" style="font-family: 'Cinzel', serif;">
                    <span class="text-[#D4A853]">K</span>-HUB
                </span>
            </a>
            
            {% if user.is_authenticated %}
            <div class="flex items-center gap-1">
                <!-- Navigation Links - Gold Style -->
                {% if user.is_player %}
                    <a href="{% url 'booking:browse_fields' %}" class="px-4 py-2 text-sm font-bold text-white/60 hover:text-[#D4A853] hover:bg-[#D4A853]/10 rounded-lg transition border border-transparent hover:border-[#D4A853]/20">
                        🏟️ Book
                    </a>
                    <a href="{% url 'teams:room_list' %}" class="px-4 py-2 text-sm font-bold text-white/60 hover:text-[#D4A853] hover:bg-[#D4A853]/10 rounded-lg transition border border-transparent hover:border-[#D4A853]/20">
                        🎮 Rooms
                    </a>
                    <a href="{% url 'booking:history' %}" class="px-4 py-2 text-sm font-bold text-white/60 hover:text-[#D4A853] hover:bg-[#D4A853]/10 rounded-lg transition border border-transparent hover:border-[#D4A853]/20">
                        📋 My Bookings
                    </a>
                {% elif user.is_venue_owner %}
                    <a href="{% url 'dashboard:owner_dashboard' %}" class="px-4 py-2 text-sm font-bold text-white/60 hover:text-[#D4A853] hover:bg-[#D4A853]/10 rounded-lg transition border border-transparent hover:border-[#D4A853]/20">
                        📊 Dashboard
                    </a>
                    <a href="{% url 'venues:booking_requests' %}" class="px-4 py-2 text-sm font-bold text-white/60 hover:text-[#D4A853] hover:bg-[#D4A853]/10 rounded-lg transition border border-transparent hover:border-[#D4A853]/20">
                        📋 Bookings
                    </a>
                {% endif %}
                
                <!-- Notification Bell - Gold -->
                <a href="{% url 'notifications:list' %}" class="relative p-2 text-white/60 hover:text-[#D4A853] transition border border-transparent hover:border-[#D4A853]/20 rounded-lg hover:bg-[#D4A853]/10">
                    <i class="fas fa-bell text-lg"></i>
                    <span id="notifBadge" class="absolute -top-1 -right-1 w-5 h-5 bg-[#D4A853] text-[#0f1724] rounded-full text-[10px] flex items-center justify-center font-bold shadow-lg shadow-[#D4A853]/30 hidden">
                        0
                    </span>
                </a>
                
                <!-- User Menu - Gold -->
                <div class="relative ml-2">
                    <button onclick="document.getElementById('userDropdown').classList.toggle('hidden')" class="flex items-center gap-2 p-2 hover:bg-[#D4A853]/10 rounded-lg transition border border-transparent hover:border-[#D4A853]/20">
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-[#D4A853] to-[#B8923E] flex items-center justify-center text-[#0f1724] font-bold text-xs shadow-lg shadow-[#D4A853]/20 border border-[#D4A853]/30">
                            {{ user.username|first|upper }}
                        </div>
                        <i class="fas fa-chevron-down text-xs text-white/40"></i>
                    </button>
                    <div id="userDropdown" class="absolute right-0 mt-2 w-48 bg-[#162035] border border-[#D4A853]/20 rounded-xl shadow-2xl shadow-[#D4A853]/10 hidden z-50 overflow-hidden">
                        <div class="p-3 border-b border-[#D4A853]/20 bg-[#D4A853]/5">
                            <p class="text-sm font-bold text-white">{{ user.username }}</p>
                            <p class="text-xs text-white/40">{{ user.email }}</p>
                        </div>
                        <a href="{% url 'accounts:profile' %}" class="flex items-center px-4 py-3 text-sm text-white/60 hover:text-[#D4A853] hover:bg-[#D4A853]/10 transition">
                            <i class="fas fa-user mr-2 text-[#D4A853]"></i>Profile
                        </a>
                        <a href="{% url 'accounts:logout' %}" class="flex items-center px-4 py-3 text-sm text-red-400 font-bold hover:bg-red-500/10 transition border-t border-[#D4A853]/20">
                            <i class="fas fa-sign-out-alt mr-2 text-red-400"></i>Sign Out
                        </a>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="flex items-center gap-3">
                <a href="{% url 'accounts:login' %}" class="text-sm font-bold text-white/60 hover:text-[#D4A853] px-4 py-2 rounded-lg border border-transparent hover:border-[#D4A853]/20 transition hover:bg-[#D4A853]/10">
                    Sign In
                </a>
                <a href="{% url 'accounts:register_player' %}" class="bg-gradient-to-r from-[#D4A853] to-[#B8923E] hover:from-[#E8C96A] hover:to-[#C9A227] text-[#0f1724] px-5 py-2 rounded-lg font-bold transition shadow-lg shadow-[#D4A853]/30 hover:shadow-[#D4A853]/50 text-sm">
                    Get Started
                </a>
            </div>
            {% endif %}
        </div>
    </div>
</nav>

<!-- JavaScript -->
<script>
    // User Dropdown
    document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('userDropdown');
        if (!e.target.closest('button') && dropdown && !dropdown.classList.contains('hidden')) {
            if (!dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        }
    });

    // Notification Badge
    function updateNotificationCount() {
        fetch('/notifications/api/count/')
            .then(response => response.json())
            .then(data => {
                const badge = document.getElementById('notifBadge');
                if (badge) {
                    if (data.count > 0) {
                        badge.textContent = data.count > 9 ? '9+' : data.count;
                        badge.classList.remove('hidden');
                        badge.classList.add('flex');
                    } else {
                        badge.classList.add('hidden');
                        badge.classList.remove('flex');
                    }
                }
            })
            .catch(error => console.error('Error fetching notifications:', error));
    }

    document.addEventListener('DOMContentLoaded', updateNotificationCount);
    setInterval(updateNotificationCount, 30000);
</script>
