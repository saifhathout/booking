<nav class="bg-white border-b-2 border-[#0B1D3A]">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="flex items-center justify-between h-16">
            <a href="/" class="flex items-center gap-3">
                <div class="relative">
                    <div class="w-10 h-11 bg-[#0066FF] flex items-center justify-center text-white font-black text-sm border-2 border-[#0B1D3A] shadow-[3px_3px_0px_#0B1D3A]"
                         style="clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); font-family: 'Orbitron', sans-serif;">K</div>
                </div>
                <span class="text-xl font-black tracking-tight" style="font-family: 'Orbitron', sans-serif;">K<span style="color: #0066FF;">-HUB</span></span>
            </a>
            
            {% if user.is_authenticated %}
            <div class="flex items-center gap-1">
                {% if user.is_player %}
                    <a href="{% url 'booking:browse' %}" class="px-3 py-2 text-xs font-bold text-[#4A5568] hover:text-[#0066FF] uppercase tracking-[1px]" style="font-family: 'Orbitron', sans-serif;">Book</a>
                    <a href="{% url 'teams:find_players' %}" class="px-3 py-2 text-xs font-bold text-[#4A5568] hover:text-[#0066FF] uppercase tracking-[1px]" style="font-family: 'Orbitron', sans-serif;">Squad</a>
                    <a href="{% url 'teams:my_chats' %}" class="p-2 text-[#4A5568] hover:text-[#0066FF]"><i class="fas fa-comment-dots"></i></a>
                {% elif user.is_venue_owner %}
                    <a href="{% url 'dashboard:owner_dashboard' %}" class="px-3 py-2 text-xs font-bold text-[#4A5568] hover:text-[#0066FF] uppercase tracking-[1px]" style="font-family: 'Orbitron', sans-serif;">Dashboard</a>
                    <a href="{% url 'venues:booking_requests' %}" class="px-3 py-2 text-xs font-bold text-[#4A5568] hover:text-[#0066FF] uppercase tracking-[1px]" style="font-family: 'Orbitron', sans-serif;">Bookings</a>
                {% endif %}
                
                <div class="relative ml-2">
                    <button onclick="document.getElementById('userDropdown').classList.toggle('hidden')" class="flex items-center gap-2 p-2">
                        <div class="w-8 h-8 rounded-lg bg-[#0066FF] flex items-center justify-center text-white font-bold text-xs border-2 border-[#0B1D3A]">{{ user.username|first|upper }}</div>
                    </button>
                    <div id="userDropdown" class="absolute right-0 mt-2 w-48 bg-white border-2 border-[#0B1D3A] rounded-xl shadow-[4px_4px_0px_#0B1D3A] hidden z-50">
                        <div class="p-3 border-b border-[#0B1D3A]">
                            <p class="text-sm font-bold">{{ user.username }}</p>
                        </div>
                        <a href="{% url 'accounts:logout' %}" class="flex items-center px-4 py-3 text-[#FF2D78] text-sm font-bold"><i class="fas fa-sign-out-alt mr-2"></i>Sign Out</a>
                    </div>
                </div>
            </div>
            {% else %}
            <a href="{% url 'accounts:login' %}" class="btn-chrome text-xs">Sign In</a>
            {% endif %}
        </div>
    </div>
</nav>

<script>
document.addEventListener('click', function(e) {
    const d = document.getElementById('userDropdown');
    if (!e.target.closest('button') && d && !d.classList.contains('hidden')) {
        if (!d.contains(e.target)) d.classList.add('hidden');
    }
});
</script>
