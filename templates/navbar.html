<nav class="border-b border-white/5 bg-black/80 backdrop-blur-xl sticky top-0 z-50">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="flex items-center justify-between h-16">
            <a href="/" class="flex items-center space-x-2">
                <span class="text-3xl font-black tracking-tighter">
                    <span class="text-[#00FF88]">GAME</span><span class="text-white">ON</span>
                </span>
            </a>
            
            {% if user.is_authenticated %}
            <div class="flex items-center space-x-3">
                <div class="hidden md:flex items-center space-x-1">
                    {% if user.is_player %}
                        <a href="{% url 'dashboard:player_dashboard' %}" class="px-4 py-2 text-sm font-semibold text-gray-400 hover:text-[#00FF88] rounded-xl hover:bg-white/5 transition">Home</a>
                        <a href="{% url 'booking:browse' %}" class="px-4 py-2 text-sm font-semibold text-gray-400 hover:text-[#00FF88] rounded-xl hover:bg-white/5 transition">Book</a>
                        <a href="{% url 'teams:list' %}" class="px-4 py-2 text-sm font-semibold text-gray-400 hover:text-[#00FF88] rounded-xl hover:bg-white/5 transition">Teams</a>
                    {% elif user.is_venue_owner %}
                        <a href="{% url 'dashboard:owner_dashboard' %}" class="px-4 py-2 text-sm font-semibold text-gray-400 hover:text-[#00FF88] rounded-xl hover:bg-white/5 transition">Home</a>
                        <a href="{% url 'venues:list' %}" class="px-4 py-2 text-sm font-semibold text-gray-400 hover:text-[#00FF88] rounded-xl hover:bg-white/5 transition">Venues</a>
                        <a href="{% url 'venues:booking_requests' %}" class="px-4 py-2 text-sm font-semibold text-gray-400 hover:text-[#00FF88] rounded-xl hover:bg-white/5 transition">Bookings</a>
                    {% endif %}
                </div>
                
                <div class="relative">
                    <button onclick="document.getElementById('userDropdown').classList.toggle('hidden')" 
                            class="flex items-center space-x-2 p-2 text-gray-400 hover:text-white rounded-xl hover:bg-white/5 transition">
                        <div class="w-9 h-9 rounded-full bg-gradient-to-br from-[#00FF88] to-[#00D4AA] flex items-center justify-center text-black font-black text-sm">
                            {{ user.email|first|upper }}
                        </div>
                    </button>
                    
                    <div id="userDropdown" class="absolute right-0 mt-2 w-64 bg-[#111] border border-white/10 rounded-2xl shadow-2xl hidden z-50">
                        <div class="p-4 border-b border-white/5">
                            <p class="text-sm font-bold truncate">{{ user.email }}</p>
                            <p class="text-xs text-gray-500 mt-1">{% if user.is_player %}Player{% else %}Venue Owner{% endif %}</p>
                        </div>
                        <a href="{% url 'accounts:logout' %}" class="flex items-center px-4 py-3 text-[#FF4757] hover:bg-[#FF4757]/5 transition text-sm font-semibold">
                            <i class="fas fa-sign-out-alt mr-3"></i> Sign Out
                        </a>
                    </div>
                </div>
            </div>
            {% else %}
            <a href="{% url 'accounts:login' %}" class="btn-fire text-sm px-6 py-3">GET STARTED</a>
            {% endif %}
        </div>
    </div>
</nav>

<script>
document.addEventListener('click', function(event) {
    const dropdown = document.getElementById('userDropdown');
    const button = event.target.closest('button');
    if (!button && dropdown && !dropdown.classList.contains('hidden')) {
        if (!dropdown.contains(event.target)) {
            dropdown.classList.add('hidden');
        }
    }
});
</script>
