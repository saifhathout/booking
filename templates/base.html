<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-HUB - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --chrome: #0066FF;
            --navy: #0B1D3A;
            --beige: #F0E8D8;
            --white: #FFFFFF;
            --pink: #FF2D78;
            --purple: #8B5CF6;
            --border: #0B1D3A;
        }
        
        * { font-family: 'Space Grotesk', sans-serif; }
        h1, h2, h3, .font-display { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        
        body {
            background: var(--beige);
            color: var(--navy);
            min-height: 100vh;
            font-weight: 500;
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(11,29,58,0.05) 2px, transparent 2px),
                            linear-gradient(90deg, rgba(11,29,58,0.05) 2px, transparent 2px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--chrome), var(--purple), var(--pink), var(--chrome));
            background-size: 200% 100%;
            animation: chromeSlide 3s linear infinite;
            z-index: 100;
        }
        
        @keyframes chromeSlide {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        main { position: relative; z-index: 1; padding-bottom: 80px; }
        
        .khub-card {
            background: var(--white);
            border: 2.5px solid var(--border);
            border-radius: 16px;
            transition: all 0.25s ease;
            box-shadow: 6px 6px 0px var(--border);
        }
        .khub-card:hover { transform: translate(-3px, -3px); box-shadow: 10px 10px 0px var(--border); }
        
        .btn-chrome {
            background: var(--chrome); color: white;
            padding: 14px 28px; border-radius: 12px;
            font-weight: 700; font-size: 13px;
            text-transform: uppercase; letter-spacing: 2px;
            border: 2.5px solid var(--border);
            box-shadow: 5px 5px 0px var(--border);
            transition: all 0.2s ease;
            font-family: 'Orbitron', sans-serif; cursor: pointer;
        }
        .btn-chrome:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px var(--border); }
        
        .btn-outline {
            background: white; color: var(--navy);
            padding: 14px 28px; border-radius: 12px;
            font-weight: 700; font-size: 13px;
            text-transform: uppercase; letter-spacing: 2px;
            border: 2.5px solid var(--border);
            box-shadow: 5px 5px 0px var(--border);
            transition: all 0.2s ease;
            font-family: 'Orbitron', sans-serif; cursor: pointer;
        }
        .btn-outline:hover { border-color: var(--chrome); color: var(--chrome); }
        
        .input-khub {
            background: white; border: 2.5px solid var(--border);
            border-radius: 12px; padding: 14px 18px;
            color: var(--navy); width: 100%;
            font-size: 16px; font-weight: 600;
            box-shadow: 4px 4px 0px var(--border);
            transition: all 0.2s ease;
        }
        .input-khub:focus { outline: none; border-color: var(--chrome); box-shadow: 6px 6px 0px var(--chrome); }
        
        .badge-khub {
            padding: 6px 14px; border-radius: 8px;
            font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px;
            border: 2px solid var(--border);
            font-family: 'Orbitron', sans-serif;
        }
        .badge-chrome { background: var(--chrome); color: white; }
        .badge-pink { background: var(--pink); color: white; }
        .badge-purple { background: var(--purple); color: white; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.4s ease forwards; }
        
        ::selection { background: var(--chrome); color: white; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--beige); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--chrome); }
    </style>
</head>
<body>
    {% include 'navbar.html' %}
    {% include 'mobile_header.html' %}
    
    <main class="container mx-auto px-4 py-6 max-w-7xl">
        {% include 'messages.html' %}
        {% block content %}{% endblock %}
    </main>
    
    {% include 'mobile_nav.html' %}
    
    {% if user.is_authenticated %}
    <script>
    fetch('/notifications/api/count/')
        .then(r => r.json())
        .then(d => {
            if(d.count > 0) {
                const b = document.getElementById('notifBadge');
                if(b) { b.textContent = d.count; b.classList.remove('hidden'); }
            }
        });
    </script>
    {% endif %}
</body>
</html>
