<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameOn - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { 
            font-family: 'Space Grotesk', sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        
        body {
            background: #0F0F0F;
            color: #FFFFFF;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Sports Background Image */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1529900748604-07564a03e7a6?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15;
            filter: brightness(0.7) saturate(1.2);
            z-index: 0;
            pointer-events: none;
        }
        
        /* Gradient overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at top right, rgba(0, 255, 136, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at bottom left, rgba(0, 180, 148, 0.06) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }
        
        main {
            position: relative;
            z-index: 1;
        }
        
        /* Energy Card */
        .energy-card {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .energy-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: linear-gradient(135deg, #00FF88, #00D4AA, #00B894, #00FF88);
            background-size: 400% 400%;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
            animation: gradientShift 3s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .energy-card:hover::before {
            opacity: 0.08;
        }
        
        .energy-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(0, 255, 136, 0.2);
            background: rgba(20, 20, 20, 0.95);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        /* Card Icon */
        .card-icon-energy {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        
        .energy-card:hover .card-icon-energy {
            transform: scale(1.15) rotate(-10deg);
            animation: bounce 0.6s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1.15) rotate(-10deg) translateY(0); }
            50% { transform: scale(1.15) rotate(-10deg) translateY(-8px); }
        }
        
        .icon-green { background: linear-gradient(135deg, #00FF88, #00D4AA); color: #000; }
        .icon-purple { background: linear-gradient(135deg, #A855F7, #7C3AED); color: #FFF; }
        .icon-orange { background: linear-gradient(135deg, #FF6B35, #F59E0B); color: #000; }
        .icon-blue { background: linear-gradient(135deg, #00D4FF, #0095FF); color: #000; }
        .icon-pink { background: linear-gradient(135deg, #FF006E, #FF4D6D); color: #FFF; }
        
        /* Buttons */
        .btn-fire {
            background: #00FF88;
            color: #000;
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-fire:hover {
            background: #00FF99;
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.3);
        }
        
        .btn-ghost {
            background: transparent;
            border: 2px solid #2A2A2A;
            color: #FFF;
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .btn-ghost:hover {
            border-color: #00FF88;
            color: #00FF88;
            background: rgba(0, 255, 136, 0.05);
        }
        
        /* Input */
        .input-fire {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #2A2A2A;
            border-radius: 14px;
            padding: 16px 20px;
            color: #FFF;
            width: 100%;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .input-fire:focus {
            outline: none;
            border-color: #00FF88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
            background: #1A1A1A;
        }
        
        .input-fire::placeholder { color: #555; }
        
        /* Badge */
        .badge-fire {
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .badge-green { background: #00FF88; color: #000; }
        .badge-red { background: #FF4757; color: #FFF; }
        .badge-gold { background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; }
        
        /* Navbar */
        nav {
            background: rgba(10, 10, 10, 0.8) !important;
            backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
        }
        
        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-up { animation: fadeUp 0.6s ease forwards; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0F0F0F; }
        ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00FF88; }
        
        /* Selection */
        ::selection { background: rgba(0, 255, 136, 0.3); color: #FFF; }
        
        /* Particles */
        .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #00FF88;
            border-radius: 50%;
            animation: particleFloat 6s ease-in-out infinite;
            opacity: 0;
        }
        
        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            20% { opacity: 0.6; }
            80% { opacity: 0.2; }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }
        
        /* Mobile padding */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
{% if user.is_authenticated %}
<script>
// VAPID Public Key
const VAPID_PUBLIC_KEY = '{{ webpush_public_key|default:"" }}';

async function subscribeToPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window) || !VAPID_PUBLIC_KEY) {
        return;
    }
    
    try {
        const registration = await navigator.serviceWorker.ready;
        
        // Check existing subscription
        let subscription = await registration.pushManager.getSubscription();
        
        if (!subscription) {
            const convertedKey = urlBase64ToUint8Array(VAPID_PUBLIC_KEY);
            
            subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: convertedKey
            });
        }
        
        // Send to server
        await fetch('/notifications/subscribe/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify(subscription)
        });
        
        console.log('✅ Push notifications enabled!');
    } catch (e) {
        console.log('Push subscription:', e.message);
    }
}

function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
}

function getCookie(name) {
    let value = "; " + document.cookie;
    let parts = value.split("; " + name + "=");
    if (parts.length == 2) return parts.pop().split(";").shift();
}

// Subscribe on page load
subscribeToPush();
</script>
{% endif %}
<body>
    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 25%; animation-delay: 1s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 55%; animation-delay: 0.5s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 1.5s;"></div>
        <div class="particle" style="left: 85%; animation-delay: 3s;"></div>
    </div>

    {% include 'navbar.html' %}
    
    <main class="container mx-auto px-4 py-8 max-w-7xl pb-safe">
        {% include 'messages.html' %}
        {% block content %}{% endblock %}
    </main>
    
    {% if user.is_authenticated %}
        {% include 'mobile_nav.html' %}
    {% endif %}

    <script>
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('userDropdown');
            const button = event.target.closest('button');
            if (!button && dropdown && !dropdown.classList.contains('hidden')) {
                if (!dropdown.contains(event.target)) {
                    dropdown.classList.add('hidden');
                }
            }
        });
    </script>
</body>
</html>
