{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#F0E8D8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="{% static 'img/logo.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <title>K-HUB - {% block title %}{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --chrome: #C9A227;        /* ✅ ذهبي */
            --navy: #1A2A4A;           /* ✅ أزرق غامق */
            --beige: #F0E8D8;          /* ✅ بيج فاتح */
            --white: #F0E8D8;          /* ✅ بيج فاتح */
            --pink: #C9A227;           /* ✅ ذهبي */
            --purple: #8B5CF6;
            --border: #1A2A4A;         /* ✅ أزرق غامق */
            --gold: #C9A227;           /* ✅ ذهبي */
            --text-light: #F0E8D8;     /* ✅ بيج فاتح */
            --text-dark: #1A2A4A;      /* ✅ أزرق غامق */
        }
        
        * { font-family: 'Cinzel', sans-serif; }
        h1, h2, h3 { font-family: 'Cinzel', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
        .orbitron { font-family: 'Cinzel', sans-serif; }
        
        body {
            background: var(--beige);
            color: var(--navy);
            min-height: 100vh;
            font-weight: 500;
            overflow-x: hidden;
        }
        
        /* Animated Pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(26,42,74,0.06) 2px, transparent 2px),
                linear-gradient(90deg, rgba(26,42,74,0.06) 2px, transparent 2px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }
        
        /* Glow Orbs */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite;
        }
        .glow-1 { width: 500px; height: 500px; background: var(--chrome); top: -100px; right: -100px; }
        .glow-2 { width: 400px; height: 400px; background: var(--purple); bottom: -100px; left: -100px; animation-delay: -4s; }
        .glow-3 { width: 300px; height: 300px; background: var(--pink); top: 50%; left: 50%; animation-delay: -6s; }
        
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        
        /* Chrome Border */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--chrome), var(--purple), var(--pink), var(--gold), var(--chrome));
            background-size: 300% 100%;
            animation: chromeSlide 2s linear infinite;
            z-index: 100;
            box-shadow: 0 0 20px rgba(201,162,39,0.3);
        }
        
        @keyframes chromeSlide {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        
        main { position: relative; z-index: 1; padding-bottom: 80px; }
        
        /* ✅ CARDS - Navy Blue */
        .khub-card {
            background: #d2caba;
            color: #304a80;
            border: 1px solid rgba(146, 97, 0, 0.1);
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }
        
        .khub-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            pointer-events: none;
            border-radius: 18px 18px 0 0;
        }
        
        .khub-card:hover {
            transform: translateY(-4px);
            border-color: var(--chrome);
            box-shadow: 0 12px 40px rgba(201,162,39,0.15);
        }
        
        /* ✅ BUTTONS - Gold */
        .btn-chrome {
            background: linear-gradient(135deg, #C9A227, #A8881E);
            color: #1A2A4A;
            padding: 16px 32px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            box-shadow: 0 4px 16px rgba(201,162,39,0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        .btn-chrome::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-chrome:hover::after {
            left: 100%;
        }
        
        .btn-chrome:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(201,162,39,0.4);
        }
        
        .btn-outline {
            background: transparent;
            color: #F0E8D8;
            padding: 16px 32px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(240,232,216,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
        }
        
        .btn-outline:hover {
            border-color: var(--chrome);
            color: var(--chrome);
            background: rgba(201,162,39,0.05);
            transform: translateY(-2px);
        }
        
        /* Inputs */
        .input-khub {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(240,232,216,0.1);
            border-radius: 14px;
            padding: 16px 20px;
            color: #F0E8D8;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .input-khub:focus {
            outline: none;
            border-color: var(--chrome);
            box-shadow: 0 0 20px rgba(201,162,39,0.08);
            background: rgba(255,255,255,0.08);
        }
        
        .input-khub::placeholder {
            color: rgba(240,232,216,0.3);
        }
        
        /* Badges */
        .badge-khub {
            padding: 7px 16px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1px solid rgba(240,232,216,0.1);
            font-family: 'Orbitron', sans-serif;
        }
        .badge-chrome { background: rgba(201,162,39,0.15); color: #C9A227; border-color: rgba(201,162,39,0.2); }
        .badge-pink { background: rgba(201,162,39,0.15); color: #C9A227; border-color: rgba(201,162,39,0.2); }
        .badge-purple { background: rgba(139,92,246,0.15); color: #8B5CF6; border-color: rgba(139,92,246,0.2); }
        .badge-gold { background: rgba(201,162,39,0.15); color: #C9A227; border-color: rgba(201,162,39,0.2); }
        
        /* Badge Price */
        .badge-price {
            background: rgba(201,162,39,0.12);
            color: #C9A227;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
        }
        
        /* Field Icons */
        .field-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            border: 2px solid rgba(240,232,216,0.15);
            flex-shrink: 0;
        }
        
        .field-icon.football { background: rgba(201,162,39,0.15); color: #C9A227; }
        .field-icon.padel { background: rgba(139,92,246,0.15); color: #8B5CF6; }
        .field-icon.basketball { background: rgba(255,107,53,0.15); color: #FF6B35; }
        .field-icon.tennis { background: rgba(16,185,129,0.15); color: #10B981; }
        
        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade-up { animation: fadeUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        ::selection { background: var(--chrome); color: #1A2A4A; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--beige); }
        ::-webkit-scrollbar-thumb { background: var(--navy); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--chrome); }
    </style>
</head>
<body>
    <!-- ✅ استخدم static هنا -->    
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
    <div class="glow-orb glow-3"></div>
    {% include 'navbar.html' %}
    {% include 'mobile_header.html' %}
    
    <main class="container mx-auto px-4 py-6 max-w-7xl  animate-fade-up">
        {% include 'messages.html' %}
  <div class="flex justify-center items-center py-4 ">
        <img src="{% static 'img/logo.png' %}" 
             alt="K-HUB" 
             class="w-32 h-32 rounded-xl border-2 border-white/10 object-cover ">
    </div>
        {% block content %}{% endblock %}
    </main>
    
    
    {% include 'mobile_nav.html' %}
    
    {% if user.is_authenticated %}
    <script>
    fetch('/notifications/api/count/')
        .then(r => r.json())
        .then(d => {
            if(d.count > 0) {
                const b = document.getElementsByClassName('notifBadge');
                if(b) { b.textContent = d.count > 9 ? '9+' : d.count; b.classList.remove('hidden'); }
            }
        });
    </script>
    {% endif %}
</body>
</html>
