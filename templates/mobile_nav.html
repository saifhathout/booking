<div class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-[#0B1D3A] z-50">
    <div class="flex justify-around py-2">
        {% if user.is_authenticated %}
            {% if user.is_player %}
                <a href="{% url 'booking:browse' %}" class="flex flex-col items-center text-[#0066FF] py-1 px-3">
                    <i class="fas fa-futbol text-xl"></i>
                    <span class="text-[10px] mt-1 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Book</span>
                </a>
                <a href="{% url 'teams:find_players' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-users text-xl"></i>
                    <span class="text-[10px] mt-1 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Squad</span>
                </a>
                <a href="{% url 'teams:my_chats' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-comment-dots text-xl"></i>
                    <span class="text-[10px] mt-1 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Chats</span>
                </a>
                <!-- Notification Bell Mobile -->
                <a href="{% url 'notifications:list' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3 relative">
                    <i class="fas fa-bell text-xl"></i>
                    <span id="notifBadgeMobile" class="absolute -top-0 right-1 w-4 h-4 bg-[#FF2D78] rounded-full text-[8px] flex items-center justify-center font-bold hidden"></span>
                    <span class="text-[10px] mt-1 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Alerts</span>
                </a>
                <a href="{% url 'booking:history' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-clock text-xl"></i>
                    <span class="text-[10px] mt-1 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Bookings</span>
                </a>
            {% elif user.is_venue_owner %}
                <a href="{% url 'dashboard:owner_dashboard' %}" class="flex flex-col items-center text-[#0066FF] py-1 px-3">
                    <i class="fas fa-home text-xl"></i>
                    <span class="text-[10px] mt-1 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Home</span>
                </a>
                <a href="{% url 'venues:booking_requests' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-calendar text-xl"></i>
                    <span class="text-[10px] mt-1 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Bookings</span>
                </a>
                <!-- Notification Bell Mobile -->
                <a href="{% url 'notifications:list' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3 relative">
                    <i class="fas fa-bell text-xl"></i>
                    <span id="notifBadgeMobile" class="absolute -top-0 right-1 w-4 h-4 bg-[#FF2D78] rounded-full text-[8px] flex items-center justify-center font-bold hidden"></span>
                    <span class="text-[10px] mt-1 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Alerts</span>
                </a>
                <a href="{% url 'accounts:logout' %}" class="flex flex-col items-center text-[#FF2D78] hover:text-[#FF4778] py-1 px-3">
                    <i class="fas fa-sign-out-alt text-xl"></i>
                    <span class="text-[10px] mt-1 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Exit</span>
                </a>
            {% endif %}
        {% endif %}
    </div>
</div>
<div class="md:hidden h-16"></div>

{% if user.is_authenticated %}
<script>
fetch('/notifications/api/count/')
    .then(r => r.json())
    .then(d => {
        if(d.count > 0) {
            const badge = document.getElementById('notifBadgeMobile');
            const badge2 = document.getElementById('notifBadge');
            if(badge) { badge.textContent = d.count; badge.classList.remove('hidden'); }
            if(badge2) { badge2.textContent = d.count; badge2.classList.remove('hidden'); }
        }
    });
</script>
{% endif %}
