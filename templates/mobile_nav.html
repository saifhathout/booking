<!-- Mobile Bottom Navigation -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-[#0B1D3A] md:hidden z-50">
    <div class="flex justify-around py-2">
        {% if user.is_authenticated %}
            {% if user.is_player %}
                <a href="{% url 'dashboard:player_dashboard' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-home text-lg"></i>
                    <span class="text-[9px] mt-0.5 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Home</span>
                </a>
                <a href="{% url 'booking:browse' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-futbol text-lg"></i>
                    <span class="text-[9px] mt-0.5 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Book</span>
                </a>
                <a href="{% url 'teams:find_players' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-users text-lg"></i>
                    <span class="text-[9px] mt-0.5 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Squad</span>
                </a>
                <a href="{% url 'teams:my_chats' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-comment-dots text-lg"></i>
                    <span class="text-[9px] mt-0.5 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Chats</span>
                </a>
                <a href="{% url 'booking:history' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-clock text-lg"></i>
                    <span class="text-[9px] mt-0.5 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Bookings</span>
                </a>
            {% elif user.is_venue_owner %}
                <a href="{% url 'dashboard:owner_dashboard' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-home text-lg"></i>
                    <span class="text-[9px] mt-0.5 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Home</span>
                </a>
                <a href="{% url 'venues:list' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-building text-lg"></i>
                    <span class="text-[9px] mt-0.5 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Venues</span>
                </a>
                <a href="{% url 'venues:booking_requests' %}" class="flex flex-col items-center text-[#4A5568] hover:text-[#0066FF] py-1 px-3">
                    <i class="fas fa-calendar text-lg"></i>
                    <span class="text-[9px] mt-0.5 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Bookings</span>
                </a>
            {% endif %}
            <a href="{% url 'accounts:logout' %}" class="flex flex-col items-center text-[#FF2D78] hover:text-[#FF4778] py-1 px-3">
                <i class="fas fa-sign-out-alt text-lg"></i>
                <span class="text-[9px] mt-0.5 font-bold uppercase tracking-wider" style="font-family: 'Orbitron', sans-serif;">Exit</span>
            </a>
        {% endif %}
    </div>
</div>

<!-- Spacer for mobile nav -->
<div class="md:hidden h-16"></div>
