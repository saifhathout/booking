<!-- mobile_header.html - Premium Glass Effect -->

{% load static %}

<!-- ✅ Mobile Header - Premium Glass -->
<div class="md:hidden fixed top-0 left-0 right-0 z-40 bg-white/80 backdrop-blur-xl border-b border-black/5 shadow-sm">
    <div class="max-w-7xl mx-auto px-5">
        <div class="flex items-center justify-between h-16">
            
            <!-- ✅ Logo - Larger & Premium -->
            <a href="/" class="flex items-center gap-3 transition-all duration-300 hover:scale-105">
                <img src="{% static 'img/logo.png' %}" 
                     alt="K-HUB" 
                     class="w-10 h-10 rounded-2xl shadow-lg border-2 border-white/20">
                <span class="text-xl font-extrabold tracking-wide text-[#1A2A4A]" 
                      style="font-family: 'Orbitron', sans-serif;">
                    K<span style="color: #12E6FF;">-HUB</span>
                </span>
            </a>
            
            {% if user.is_authenticated %}
            <div class="flex items-center gap-2">
                
                <!-- ✅ Notification Bell - Larger -->
                <a href="{% url 'notifications:list' %}" 
                   class="w-10 h-10 rounded-2xl flex items-center justify-center text-[#1A2A4A] hover:bg-[#1A2A4A]/10 transition-all duration-300 hover:scale-110 relative">
                    <i class="fas fa-bell text-lg"></i>
                    
                    <!-- ✅ Badge - Better sizing -->
                    <span id="notifBadgeMobile" 
                          class="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-red-500 text-white text-[10px] font-bold flex items-center justify-center hidden">
                        0
                    </span>
                </a>
                
                <!-- ✅ Avatar - Gradient -->
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-[#1A2A4A] to-[#4e69ba] flex items-center justify-center text-white font-bold text-sm shadow-lg transition-all duration-300 hover:scale-110">
                    {{ user.username|first|upper }}
                </div>
                
            </div>
            {% else %}
            
            <!-- ✅ Login Button - Pill Shape -->
            <a href="{% url 'accounts:login' %}" 
               class="text-sm font-semibold text-[#1A2A4A] px-5 py-2 rounded-full border-2 border-[#1A2A4A]/10 hover:border-[#1A2A4A] hover:bg-[#1A2A4A] hover:text-white transition-all duration-300">
                Login
            </a>
            
            {% endif %}
        </div>
    </div>
</div>

<!-- Spacer -->
<div class="md:hidden h-16"></div>

<!-- ✅ JavaScript for Notification Badge -->
<script>
    function updateNotificationBadge() {
        fetch('/notifications/api/count/')
            .then(response => response.json())
            .then(data => {
                const badge = document.getElementById('notifBadgeMobile');
                if (badge) {
                    if (data.count > 0) {
                        badge.textContent = data.count > 9 ? '9+' : data.count;
                        badge.classList.remove('hidden');
                        badge.classList.add('flex');
                    } else {
                        badge.classList.add('hidden');
                        badge.classList.remove('flex');
                    }
                }
            })
            .catch(error => console.error('Error fetching notifications:', error));
    }

    // Update on load
    document.addEventListener('DOMContentLoaded', updateNotificationBadge);
    
    // Update every 30 seconds
    setInterval(updateNotificationBadge, 30000);
</script>
