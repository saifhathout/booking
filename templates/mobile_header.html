<!-- Mobile Header -->
<div class="md:hidden fixed top-0 left-0 right-0 z-40 bg-[#161630] border-b border-white/5">
    <div class="flex items-center justify-between px-4 h-14">
        <!-- Logo -->
        <a href="/" class="flex items-center gap-2">
            <img src="/static/img/logo.png" alt="K-HUB" class="w-8 h-8 rounded-lg object-contain bg-white">
            <span class="text-lg font-black tracking-tight text-white" style="font-family: 'Orbitron', sans-serif;">
                K<span style="color: #4F8CFF;">-HUB</span>
            </span>
        </a>
        
        {% if user.is_authenticated %}
        <div class="flex items-center gap-2">
            {% if user.is_player %}
              <a href="{% url 'teams:room_list' %}" class="flex flex-col items-center justify-center gap-0.5 flex-1 py-1">
                  
                </a>
            {% endif %}
            
            <a href="{% url 'notifications:list' %}" class="w-9 h-9 rounded-xl flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/5 transition relative">
                <i class="fas fa-bell text-lg"></i>
                <span id="notifBadgeHeader" class="absolute top-1 right-1 w-3.5 h-3.5 bg-red-500 rounded-full text-[7px] flex items-center justify-center font-bold text-white hidden"></span>
            </a>
            
            <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-[#4F8CFF] to-[#3366CC] flex items-center justify-center text-white font-bold text-xs">
                {{ user.username|first|upper }}
            </div>
        </div>
        {% endif %}
    </div>
</div>

<div class="md:hidden h-14"></div>
