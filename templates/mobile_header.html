<!-- mobile_header.html - Premium Glass Effect - Royal Navy + Gold -->

{% load static %}

<!-- ✅ Mobile Header - Premium Glass -->
<div class="md:hidden fixed top-0 left-0 right-0 z-40 bg-[#0f1724]/80 backdrop-blur-2xl border-b border-[#D4A853]/10 shadow-lg shadow-[#D4A853]/5">
    <div class="max-w-7xl mx-auto px-5">
        <div class="flex items-center justify-between h-16">
            
            <!-- ✅ Logo - Gold Accent -->
            <a href="/" class="flex items-center gap-3 transition-all duration-300 hover:scale-105">
                <div class="relative">
                    <img src="{% static 'img/logo.png' %}" 
                         alt="K-HUB" 
                         class="w-10 h-10 rounded-2xl shadow-lg  border-[#D4A853]/30">
                    <div class="absolute -inset-1 rounded-2xl bg-[#D4A853]/10 blur-xl -z-10"></div>
                </div>
                <span class="text-xl font-extrabold tracking-wide text-white" 
                      style="font-family: 'Cinzel', serif;">
                    <span class="text-[#D4A853]">K</span>-HUB
                </span>
            </a>
            
            {% if user.is_authenticated %}
            <div class="flex items-center gap-2">
                
                <!-- ✅ Notification Bell - Gold -->
                <a href="{% url 'notifications:list' %}" 
                   class="w-10 h-10 rounded-2xl flex items-center justify-center text-[#D4A853] hover:bg-[#D4A853]/10 transition-all duration-300 hover:scale-110 relative border border-[#D4A853]/10">
                    <i class="fas fa-bell text-lg"></i>
                    
                    <!-- ✅ Badge - Gold -->
                    <span id="notifBadgeMobile" 
                          class="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-[#D4A853] text-[#0f1724] text-[10px] font-bold flex items-center justify-center hidden shadow-lg shadow-[#D4A853]/30">
                        0
                    </span>
                </a>
                
                <!-- ✅ Avatar - Gold Gradient -->
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-[#D4A853] to-[#B8923E] flex items-center justify-center text-[#0f1724] font-bold text-sm shadow-lg shadow-[#D4A853]/20 transition-all duration-300 hover:scale-110 border border-[#D4A853]/30">
                    {{ user.username|first|upper }}
                </div>
                
            </div>
            {% else %}
            
            <!-- ✅ Login Button - Gold Outline -->
            <a href="{% url 'accounts:login' %}" 
               class="text-sm font-bold text-[#D4A853] px-5 py-2 rounded-full border-2 border-[#D4A853]/30 hover:border-[#D4A853] hover:bg-[#D4A853] hover:text-[#0f1724] transition-all duration-300 shadow-lg shadow-[#D4A853]/10 hover:shadow-[#D4A853]/30">
                Login
            </a>
            
            {% endif %}
        </div>
    </div>
</div>

<!-- Spacer -->
<div class="md:hidden h-16"></div>

<!-- ✅ JavaScript for Notification Badge -->
<script>
    function updateNotificationBadge() {
        fetch('/notifications/api/count/')
            .then(response => response.json())
            .then(data => {
                const badge = document.getElementById('notifBadgeMobile');
                if (badge) {
                    if (data.count > 0) {
                        badge.textContent = data.count > 9 ? '9+' : data.count;
                        badge.classList.remove('hidden');
                        badge.classList.add('flex');
                    } else {
                        badge.classList.add('hidden');
                        badge.classList.remove('flex');
                    }
                }
            })
            .catch(error => console.error('Error fetching notifications:', error));
    }

    // Update on load
    document.addEventListener('DOMContentLoaded', updateNotificationBadge);
    
    // Update every 30 seconds
    setInterval(updateNotificationBadge, 30000);
</script>
