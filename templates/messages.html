{% if messages %}
    {% for message in messages %}
        <div class="mb-4 px-4 py-3 rounded-xl text-sm font-bold border-2 border-[#0B1D3A] shadow-[3px_3px_0px_#0B1D3A]
            {% if message.tags == 'success' %}bg-[#0066FF]/10 text-[#0066FF]
            {% elif message.tags == 'error' %}bg-[#FF2D78]/10 text-[#FF2D78]
            {% elif message.tags == 'warning' %}bg-[#FFB800]/10 text-[#D49500]
            {% else %}bg-white text-[#0B1D3A]{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
