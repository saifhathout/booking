{% extends 'base.html' %}
{% block title %}Create Post{% endblock %}
{% block content %}

<div class="max-w-lg mx-auto animate-fade-up">
    <h1 class="text-3xl font-black mb-8" style="font-family: 'Orbitron', sans-serif;">CREATE <span style="color: #0066FF;">POST</span></h1>
    
    <div class="khub-card p-8">
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <select name="sport_type" class="input-khub" required>
                <option value="">Select Sport</option>
                <option value="PADEL">🎾 Padel</option>
                <option value="FOOTBALL">⚽ Volta</option>
                <option value="TENNIS">🎾 Padol</option>
            </select>
            <input type="number" name="players_needed" class="input-khub" placeholder="Players needed" value="1" min="1">
            <input type="date" name="date" class="input-khub" required>
            <input type="time" name="time" class="input-khub">
            <textarea name="description" class="input-khub" rows="3" placeholder="Message (optional)"></textarea>
            <button type="submit" class="btn-chrome w-full py-4 text-xs">CREATE POST</button>
        </form>
    </div>
</div>

{% endblock %}
