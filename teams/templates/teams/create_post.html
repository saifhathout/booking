{% extends 'base.html' %}
{% block title %}Create Post{% endblock %}
{% block content %}

<div class="max-w-lg mx-auto animate-fade-up">
    <h1 class="text-3xl font-black mb-8">Create <span class="text-[#00FF88]">Post</span></h1>
    
    <div class="energy-card p-8">
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <select name="sport_type" class="input-fire" required>
                <option value="">Select Sport</option>
                <option value="PADEL">🎾 Padel</option>
                <option value="FOOTBALL">⚽ Football</option>
                <option value="TENNIS">🎾 Tennis</option>
                <option value="BASKETBALL">🏀 Basketball</option>
            </select>
            <input type="number" name="players_needed" class="input-fire" placeholder="Players needed" value="1" min="1">
            <input type="text" name="city" class="input-fire" placeholder="City" required>
            <input type="date" name="date" class="input-fire" required>
            <input type="time" name="time" class="input-fire">
            <button type="submit" class="btn-fire w-full py-4">CREATE POST</button>
        </form>
    </div>
</div>

{% endblock %}
