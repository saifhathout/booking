{% extends 'base.html' %}
{% block title %}Create Room{% endblock %}
{% block content %}

<div class="max-w-xl mx-auto mt-8 animate-fade-up">

    <div class="text-center mb-8">
        <h1 class="text-4xl font-black tracking-wide text-[#1A2A4A]">
            CREATE
            <span class="text-[#12E6FF]">ROOM</span>
        </h1>

        <p class="text-[#6B7280] mt-2">
            Host your next game and invite players.
        </p>
    </div>

    <div class="rounded-3xl bg-white/60 backdrop-blur-xl border border-white/40 shadow-xl p-8">

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-[#1A2A4A] mb-2">
                    Room Title
                </label>

                <input
                    type="text"
                    name="title"
                    placeholder="Padel Night"
                    class="w-full rounded-2xl border border-[#D9D2BF] bg-white px-5 py-4 outline-none focus:border-[#12E6FF] focus:ring-2 focus:ring-[#12E6FF]/30">
            </div>

            <div>
                <label class="block text-sm font-semibold text-[#1A2A4A] mb-2">
                    Sport
                </label>

                <select
                    name="sport_type"
                    class="w-full rounded-2xl border border-[#D9D2BF] bg-white px-5 py-4">

                    <option>Select Sport</option>
                    <option>🎾 Padel</option>
                    <option>⚽ Football</option>
                    <option>🎾 Tennis</option>

                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-semibold text-[#1A2A4A] mb-2">
                        Players
                    </label>

                    <input
                        type="number"
                        name="max_players"
                        value="4"
                        class="w-full rounded-2xl border border-[#D9D2BF] bg-white px-5 py-4">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-[#1A2A4A] mb-2">
                        Date
                    </label>

                    <input
                        type="date"
                        name="date"
                        class="w-full rounded-2xl border border-[#D9D2BF] bg-white px-5 py-4">
                </div>

            </div>

            <div>
                <label class="block text-sm font-semibold text-[#1A2A4A] mb-2">
                    Time
                </label>

                <input
                    type="time"
                    name="time"
                    class="w-full rounded-2xl border border-[#D9D2BF] bg-white px-5 py-4">
            </div>

            <button
                class="w-full rounded-2xl bg-[#1A2A4A] hover:bg-[#24395E] text-white py-4 font-bold text-lg transition duration-300">

                🚀 Create Room

            </button>

        </form>

    </div>

</div>
{% endblock %}
