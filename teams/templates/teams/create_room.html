{% extends 'base.html' %}
{% block title %}Create Room{% endblock %}
{% block content %}

<div class="max-w-lg mx-auto animate-fade-up">
    <h1 class="text-3xl font-black mb-8" style="font-family: 'Orbitron', sans-serif;">
        HOST <span style="color: #0066FF;">ROOM</span>
    </h1>
    
    <div class="khub-card p-8">
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="text-sm font-bold text-[#4A5568] mb-2 block">Room Title</label>
                <input type="text" name="title" class="input-khub" placeholder="e.g., Padel Night!" required>
            </div>
            
            <div>
                <label class="text-sm font-bold text-[#4A5568] mb-2 block">Sport</label>
                <select name="sport_type" class="input-khub" required>
                    <option value="">Select Sport</option>
                    <option value="PADEL">🎾 Padel</option>
                    <option value="FOOTBALL">⚽ Football</option>
                    <option value="BASKETBALL">🏀 Basketball</option>
                    <option value="TENNIS">🎾 Tennis</option>
                    <option value="VOLLEYBALL">🏐 Volleyball</option>
                </select>
            </div>
            
            <div>
                <label class="text-sm font-bold text-[#4A5568] mb-2 block">Max Players</label>
                <input type="number" name="max_players" class="input-khub" value="4" min="2" max="10">
            </div>
            
            <div>
                <label class="text-sm font-bold text-[#4A5568] mb-2 block">Date</label>
                <input type="date" name="date" class="input-khub" required>
            </div>
            
            <div>
                <label class="text-sm font-bold text-[#4A5568] mb-2 block">Time (optional)</label>
                <input type="time" name="time" class="input-khub">
            </div>
            
            <div>
                <label class="text-sm font-bold text-[#4A5568] mb-2 block">City</label>
                <input type="text" name="city" class="input-khub" value="Cairo">
            </div>
            
            <button type="submit" class="btn-chrome w-full py-4 text-sm">🎮 Create Room</button>
        </form>
    </div>
</div>

{% endblock %}
