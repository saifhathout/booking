{% extends 'base.html' %}
{% block title %}Add Venue{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto animate-fade-up">
    <h1 class="text-3xl font-bold mb-8" style="font-family: 'Orbitron', sans-serif;">ADD <span style="color: #0066FF;">VENUE</span></h1>
    
    <div class="khub-card p-8">
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <input type="text" name="name" class="input-khub" placeholder="Venue Name" required>
            <textarea name="address" class="input-khub" rows="3" placeholder="Address" required></textarea>
            <input type="text" name="city" class="input-khub" placeholder="City" required>
            <select name="sport_type" class="input-khub" required>
                <option value="">Select Sport</option>
                <option value="FOOTBALL">⚽ Football</option>
                <option value="CRICKET">🏏 Cricket</option>
                <option value="BASKETBALL">🏀 Basketball</option>
                <option value="TENNIS">🎾 Tennis</option>
            </select>
            <textarea name="description" class="input-khub" rows="3" placeholder="Description"></textarea>
            <div class="flex gap-4">
                <button type="submit" class="btn-chrome flex-1 py-3 text-xs">Save Venue</button>
                <a href="{% url 'venues:list' %}" class="btn-outline flex-1 py-3 text-xs text-center">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
