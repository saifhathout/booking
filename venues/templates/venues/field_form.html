{% extends 'base.html' %}
{% block title %}Add Field{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">
    <div class="glass p-8">
        <h1 class="text-3xl font-bold mb-2">⚽ Add Field</h1>
        <p class="text-gray-400 mb-8">to {{ venue.name }}</p>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="text-sm text-gray-400 mb-1 block">Field Name</label>
                {{ form.name }}
            </div>
            
            <div>
                <label class="text-sm text-gray-400 mb-1 block">Sport Type</label>
                {{ form.sport_type }}
            </div>
            
            <div>
                <label class="text-sm text-gray-400 mb-1 block">Description</label>
                {{ form.description }}
            </div>
            
            <div>
                <label class="text-sm text-gray-400 mb-1 block">Price Per Hour ($)</label>
                {{ form.price_per_hour }}
            </div>
            
            <div class="flex items-center space-x-3">
                {{ form.is_active }}
                <label class="text-sm text-gray-300">Active (available for booking)</label>
            </div>
            
            <div class="flex space-x-4">
                <button type="submit" class="btn-primary flex-1">
                    <i class="fas fa-plus mr-2"></i> Save Field
                </button>
                <a href="{% url 'venues:venue_detail' venue.id %}" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-xl font-medium transition text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
