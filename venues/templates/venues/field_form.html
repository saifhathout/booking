{% extends 'base.html' %}
{% block title %}Add Field{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto animate-fade-up">
    <h1 class="text-3xl font-bold mb-8" style="font-family: 'Orbitron', sans-serif;">ADD <span style="color: #0066FF;">FIELD</span></h1>
    <p class="text-sm text-[#4A5568] mb-8">to {{ venue.name }}</p>
    
    <div class="khub-card p-8">
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <input type="text" name="name" class="input-khub" placeholder="Field Name" required>
            <select name="sport_type" class="input-khub" required>
                <option value="">Select Sport</option>
                <option value="FOOTBALL">⚽ Football</option>
                <option value="CRICKET">🏏 Cricket</option>
                <option value="BASKETBALL">🏀 Basketball</option>
                <option value="TENNIS">🎾 Tennis</option>
            </select>
            <textarea name="description" class="input-khub" rows="3" placeholder="Description"></textarea>
            <input type="number" name="price_per_hour" class="input-khub" placeholder="Price Per Hour ($)" required>
            <div class="flex items-center gap-2">
                <input type="checkbox" name="is_active" checked class="w-5 h-5 accent-[#0066FF]">
                <label class="text-sm">Active</label>
            </div>
            <div class="flex gap-4">
                <button type="submit" class="btn-chrome flex-1 py-3 text-xs">Save Field</button>
                <a href="{% url 'venues:venue_detail' venue.id %}" class="btn-outline flex-1 py-3 text-xs text-center">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
